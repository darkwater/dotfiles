# https://wiki.hyprland.org/Configuring/Configuring-Hyprland/

source = ~/.config/hypr/keybinds.conf
source = ~/.config/hypr/input.conf
source = ~/.config/hypr/rules.conf
source = ~/.config/hypr/plugins.conf

# TODO: remove
cursor:no_hardware_cursors = 0


#debug:disable_logs = false
#debug:enable_stdout_logs = true
#debug:overlay = true
debug:damage_tracking = true


# MONITORS
# https://wiki.hyprland.org/Configuring/Monitors/

# nagumo
monitor = desc:BOE 0x0B7B, 2560x1600@165, 256x1728, 1.6
# monitor = desc:BOE 0x0B7B, disable
monitor = desc:Iiyama North America PL3466WQ 0000000000000, 3440x1440@60, -384x288, 1.0
monitor = desc:Hitevision Group ActivPanel V6 0x00000001, 1920x1080@60, 256x1728, 1, mirror, eDP-1
monitor = desc:LG Electronics LG ULTRAGEAR 010NTYTD9010, 2560x1440@120, -24x287, 1.0

# tetsuya
# monitor = DP-2, disable # VR

 monitor = desc:GIGA-BYTE TECHNOLOGY CO. LTD. AORUS FO32U2P 24260B001213, 3840x2160@240, 0x0, 1.25, bitdepth, 10
 monitor = desc:LG Electronics 27GL850 007NTUW2V582, 2560x1440@120, 3072x-400, 1.0, bitdepth, 10, transform, 1
 monitor = desc:Samsung Electric Company SAMSUNG 0x01000E00, disable
#monitor = desc:GIGA-BYTE TECHNOLOGY CO. LTD. AORUS FO32U2P 24260B001213, disable
#monitor = desc:LG Electronics 27GL850 007NTUW2V582, disable
#monitor = desc:Samsung Electric Company SAMSUNG 0x01000E00, 1920x1080@120, 0x0, 1.0

# monitor = desc:Samsung Electric Company SAMSUNG 0x01000E00, 3840x2160@60, 4512x0, 2.5, bitdepth, 8
# monitor = desc:Samsung Electric Company SAMSUNG 0x01000E00, 1920x1080@60, 4512x0, 1.5

# holo
monitor = desc:Valve Corporation ANX7530 U 0x00000001, 800x1280@90, 1792x1728, 1, transform, 3
# monitor = desc:Valve Corporation ANX7530 U 0x00000001, disable
monitor = desc:XXX XYZTIUM 0x950114D8, 2560x1600@165, 192x1528, 1.6

xwayland:force_zero_scaling = true

exec = ~/.config/hypr/per-host.sh
exec-once = ~/.config/hypr/per-host.sh once


# experimental:xx_color_management_v4 = false


# exec = gsettings set org.gnome.desktop.interface gtk-theme "Breeze-Dark"    # GTK3
# exec = gsettings set org.gnome.desktop.interface color-scheme "prefer-dark" # GTK4
# env = QT_QPA_PLATFORMTHEME,qt6ct                                            # Qt
env = GTK_THEME,Adwaita:dark
env = GTK2_RC_FILES,/usr/share/themes/Adwaita-dark/gtk-2.0/gtkrc
env = QT_STYLE_OVERRIDE,Adwaita-Dark


# ENVIRONMENT VARIABLES
# https://wiki.hyprland.org/Configuring/Environment-variables/
env = XCURSOR_SIZE,24
env = XCURSOR_THEME,Adwaita
env = HYPRCURSOR_SIZE,24
env = HYPRCURSOR_THEME,Adwaita
exec = hyprctl setcursor Adwaita 24

general:gaps_in = 5
general:gaps_out = 20, 20, 0, 20
general:border_size = 1
general:col.active_border = rgba(33eeffee) rgba(33ccffee) 45deg
general:col.inactive_border = rgba(595959aa)
general:resize_on_border = true
general:allow_tearing = true
general:layout = master

decoration:rounding = 6
decoration:rounding_power = 4
decoration:active_opacity = 1.0
decoration:inactive_opacity = 1.0
decoration:shadow:enabled = false
decoration:shadow:range = 4
decoration:shadow:render_power = 3
decoration:shadow:color = rgba(1a1a1aee)
decoration:blur:enabled = false
decoration:blur:size = 12
decoration:blur:passes = 2
decoration:blur:vibrancy = 0.1696
decoration:blur:special = false

animations {
    enabled = true
    bezier = myBezier, 0.05, 0.9, 0.1, 1.00
    animation = layers,           1, 2, default
    animation = windows,          1, 2, default
    animation = windowsOut,       1, 2, default, popin 80%
    animation = border,           1, 2, default
    animation = borderangle,      1, 2, default
    animation = fade,             1, 2, default
    animation = workspaces,       1, 2, default
    animation = specialWorkspace, 1, 2, default, slidefadevert
}

dwindle:pseudotile = true
dwindle:preserve_split = true

master:new_status = slave
master:mfact = 0.6
master:slave_count_for_center_master = 0

render:direct_scanout = 2
render:cm_fs_passthrough = 2
render:cm_enabled = true
render:cm_auto_hdr = 2
render:new_render_scheduling = false
quirks:prefer_hdr = 1 # always
# quirks:prefer_hdr = 2 # gamescope only

binds:hide_special_on_workspace_change = true

# misc:force_default_wallpaper = 0
# misc:disable_hyprland_logo = false
# misc:disable_splash_rendering = true
misc:vfr = false
misc:vrr = 0
misc:enable_anr_dialog = false

ecosystem:no_donation_nag = true
ecosystem:no_update_news = true

# vim:nobackup
